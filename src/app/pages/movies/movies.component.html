<div class="w-full h-auto bg-midnight flex flex-col lg:flex-row gap-[10px] lg:gap-0">
    <div class="w-full lg:w-[11%]">
        <app-sidebar></app-sidebar>
    </div>
    <div class="w-full lg:py-[1.5rem]">
        <div class="w-full">
            <div class="w-full mx-auto flex items-center gap-[1rem] px-[1rem] py-[10px] lg:py-0 md:p-[1.5rem]">
                <img src="../../../assets/icon-search.svg" alt="icon-search">
                <input 
                    type="text"
                    [(ngModel)]="search"
                    (keyup)="searchList()"
                    placeholder="Search for movies"
                    class="w-[90%] bg-midnight py-[8px] caret-plum focus:text-white focus:outline-none focus:border-b-2 focus:border-b-slate cursor-pointer"
                >
            </div>
        </div>

        <div class="px-[1rem] md:px-[1.5rem] mt-[20px]">
            @if (search === '') {
                <h1 class="text-white text-lg font-light tracking-wide mb-[14px]">Movies</h1>
            } @else {}
            <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-[1rem]">
                <app-movie-list *ngFor="let movie of movies" [movieList]="movie" />
            </div>
        </div>
    </div>
</div>
